name: Daily full scrape

on:
  schedule:
    - cron: '30 1 * * *'
    - cron: '30 2 * * *'
  workflow_dispatch:

concurrency:
  group: daily-full-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Guard Paris night schedule
        id: schedule_guard
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Manual run requested."
            exit 0
          fi

          paris_offset="$(TZ=Europe/Paris date +'%z')"
          scheduled_cron="${{ github.event.schedule }}"
          echo "Paris offset: ${paris_offset}"
          echo "Scheduled cron: ${scheduled_cron}"

          case "${paris_offset}" in
            +0200)
              expected_cron='30 1 * * *'
              ;;
            +0100)
              expected_cron='30 2 * * *'
              ;;
            *)
              echo "::error::Unsupported Europe/Paris offset: ${paris_offset}"
              exit 1
              ;;
          esac

          if [ "${scheduled_cron}" = "${expected_cron}" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping cron ${scheduled_cron}; Europe/Paris offset ${paris_offset} maps to ${expected_cron}."
          fi

      - name: Checkout
        if: steps.schedule_guard.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.schedule_guard.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22.17.0
          cache: npm

      - name: Install dependencies
        if: steps.schedule_guard.outputs.should_run == 'true'
        run: npm ci

      - name: Install Chromium
        if: steps.schedule_guard.outputs.should_run == 'true'
        run: npx playwright install --with-deps chromium

      - name: Check database secret
        if: steps.schedule_guard.outputs.should_run == 'true'
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        shell: bash
        run: |
          if [ -z "$POSTGRES_URL" ] && [ -z "$DATABASE_URL" ]; then
            echo "::error::Missing POSTGRES_URL or DATABASE_URL repository secret."
            exit 1
          fi

          echo "Database URL secret is configured."

      - name: Run full scrape
        if: steps.schedule_guard.outputs.should_run == 'true'
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run scrape

      - name: Upload scrape artifacts
        if: always() && steps.schedule_guard.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: daily-full-scrape-results
          path: |
            scrape-results.json
            scrape-history.log
          if-no-files-found: ignore
          retention-days: 14
