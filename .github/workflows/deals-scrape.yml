name: Refresh deals

on:
  workflow_dispatch:

jobs:
  scrape-deals:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.17.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Check database secret
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        shell: bash
        run: |
          if [ -z "$POSTGRES_URL" ] && [ -z "$DATABASE_URL" ]; then
            echo "::error::Missing POSTGRES_URL or DATABASE_URL repository secret."
            exit 1
          fi

          echo "Database URL secret is configured."

      - name: Run deal scrape
        shell: bash
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -o pipefail
          npm run scrape:deals 2>&1 | tee deals-scrape.log

      - name: Upload deal scrape log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deal-scrape-log
          path: deals-scrape.log
          if-no-files-found: ignore
          retention-days: 14
