<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-labelledby="cp1i-title cp1i-desc">
  <title id="cp1i-title">ComparPrix — L'Inspecteur</title>
  <desc id="cp1i-desc">Loupe grossissant un cartouche € barré d'un filet éditorial.</desc>
  <defs>
    <style>
      .ink1 { fill: #0F1623; }
      .navy1 { fill: #0F2C52; }
      .cream1 { fill: #FCFDFE; }
      .stroke-ink1 { stroke: #0F1623; fill: none; }
      .serif1 { font-family: Fraunces, Georgia, 'Times New Roman', serif; font-weight: 700; }
    </style>
  </defs>

  <!-- Cartouche (price plaque) visible behind the lens -->
  <g>
    <rect x="40" y="40" width="120" height="120" class="cream1" stroke="#0F1623" stroke-width="5"/>
    <rect x="50" y="50" width="100" height="100" class="stroke-ink1" stroke-width="2"/>
    <text x="100" y="128" text-anchor="middle" class="serif1 ink1" font-size="110">€</text>
  </g>

  <!-- Magnifying glass lens — placed on top, fill cream so the cartouche edge stays subtle inside -->
  <g>
    <circle cx="100" cy="92" r="58" class="cream1" stroke="#0F1623" stroke-width="9"/>
    <circle cx="100" cy="92" r="50" class="stroke-ink1" stroke-width="2.5"/>
    <text x="100" y="120" text-anchor="middle" class="serif1 navy1" font-size="86">€</text>
  </g>

  <!-- Handle -->
  <g>
    <line x1="143" y1="135" x2="184" y2="176" stroke="#0F1623" stroke-width="14" stroke-linecap="square"/>
    <line x1="143" y1="135" x2="184" y2="176" stroke="#0F2C52" stroke-width="5" stroke-linecap="square"/>
  </g>
</svg>
