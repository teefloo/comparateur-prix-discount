<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" width="520" height="180" role="img" aria-labelledby="cp1h-title cp1h-desc">
  <title id="cp1h-title">ComparPrix — Le Bulletin des Prix Discount</title>
  <desc id="cp1h-desc">Logo ComparPrix horizontal : loupe sur cartouche € avec wordmark et tagline éditoriale.</desc>
  <defs>
    <style>
      .ink1 { fill: #0F1623; }
      .navy1 { fill: #0F2C52; }
      .cream1 { fill: #FCFDFE; }
      .stroke-ink1 { stroke: #0F1623; fill: none; }
      .display1 { font-family: 'Big Shoulders Display', Impact, 'Arial Black', sans-serif; font-weight: 800; letter-spacing: -0.01em; }
      .serif1 { font-family: Fraunces, Georgia, 'Times New Roman', serif; font-weight: 700; }
      .eyebrow1 { font-family: 'JetBrains Mono', 'Courier New', monospace; font-weight: 700; letter-spacing: 0.22em; }
    </style>
  </defs>

  <!-- ICON -->
  <g transform="translate(10, 10)">
    <rect x="40" y="20" width="120" height="120" class="cream1" stroke="#0F1623" stroke-width="5"/>
    <rect x="50" y="30" width="100" height="100" class="stroke-ink1" stroke-width="2"/>
    <text x="100" y="108" text-anchor="middle" class="serif1 ink1" font-size="110">€</text>

    <circle cx="100" cy="72" r="58" class="cream1" stroke="#0F1623" stroke-width="9"/>
    <circle cx="100" cy="72" r="50" class="stroke-ink1" stroke-width="2.5"/>
    <text x="100" y="100" text-anchor="middle" class="serif1 navy1" font-size="86">€</text>

    <line x1="143" y1="115" x2="184" y2="156" stroke="#0F1623" stroke-width="14" stroke-linecap="square"/>
    <line x1="143" y1="115" x2="184" y2="156" stroke="#0F2C52" stroke-width="5" stroke-linecap="square"/>
  </g>

  <!-- WORDMARK -->
  <g transform="translate(220, 0)">
    <text x="0" y="106" class="display1 ink1" font-size="76">Compar<tspan class="navy1">Prix</tspan></text>
    <line x1="0" y1="120" x2="280" y2="120" stroke="#0F1623" stroke-width="3"/>
    <line x1="0" y1="127" x2="280" y2="127" stroke="#0F1623" stroke-width="1"/>
    <text x="0" y="152" class="eyebrow1" font-size="12" fill="#374150">LE BULLETIN DES PRIX DISCOUNT · № 01</text>
  </g>
</svg>
