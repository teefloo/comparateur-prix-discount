<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-labelledby="cp2i-title cp2i-desc">
  <title id="cp2i-title">ComparPrix — L'Étiquette</title>
  <desc id="cp2i-desc">Étiquette de prix suspendue à un cordon par un trou de perforation, € monumental en serif navy, loupe en accent bottom-right, ombre brutaliste.</desc>
  <defs>
    <style>
      .ink2 { fill: #0F1623; }
      .navy2 { fill: #0F2C52; }
      .cream2 { fill: #FCFDFE; }
      .serif2 { font-family: Fraunces, Georgia, 'Times New Roman', serif; font-weight: 700; }
    </style>
  </defs>

  <!-- Cordon (string) : deux brins qui convergent au trou -->
  <line x1="20" y1="6" x2="40" y2="65" stroke="#0F1623" stroke-width="4" stroke-linecap="round"/>
  <line x1="72" y1="6" x2="40" y2="65" stroke="#0F1623" stroke-width="4" stroke-linecap="round"/>

  <!-- Tag shadow (offset 4px down-right, brutaliste) -->
  <path d="M 196 54 L 196 196 L 12 196 L 12 84 L 62 54 Z" fill="#0F1623"/>

  <!-- Tag main body (cream avec bordure encre 5px) -->
  <path d="M 192 50 L 192 192 L 8 192 L 8 80 L 58 50 Z"
        fill="#FCFDFE" stroke="#0F1623" stroke-width="5" stroke-linejoin="miter"/>

  <!-- Hole punch (le cordon "disparaît" dedans grâce à l'ordre de calque) -->
  <circle cx="40" cy="65" r="8" fill="#FCFDFE" stroke="#0F1623" stroke-width="4"/>

  <!-- € monumental (Fraunces, navy) -->
  <text x="100" y="162" text-anchor="middle" class="serif2 navy2" font-size="124">€</text>

  <!-- Mini loupe accent (bottom-right) avec double-rule interne -->
  <g>
    <circle cx="160" cy="160" r="20" fill="#FCFDFE" stroke="#0F1623" stroke-width="5"/>
    <circle cx="160" cy="160" r="14" fill="none" stroke="#0F1623" stroke-width="1.5"/>
    <line x1="175" y1="175" x2="189" y2="189" stroke="#0F1623" stroke-width="7" stroke-linecap="square"/>
    <line x1="175" y1="175" x2="189" y2="189" stroke="#0F2C52" stroke-width="2.2" stroke-linecap="square"/>
  </g>
</svg>
