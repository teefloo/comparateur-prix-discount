<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" width="520" height="180" role="img" aria-labelledby="cp3h-title cp3h-desc">
  <title id="cp3h-title">ComparPrix — Le Bulletin des Prix Discount</title>
  <desc id="cp3h-desc">Logo ComparPrix horizontal : médaillon éditorial avec € monumental et wordmark.</desc>
  <defs>
    <style>
      .ink3 { fill: #0F1623; }
      .navy3 { fill: #0F2C52; }
      .cream3 { fill: #FCFDFE; }
      .stroke-ink3 { stroke: #0F1623; fill: none; }
      .display3 { font-family: 'Big Shoulders Display', Impact, 'Arial Black', sans-serif; font-weight: 800; letter-spacing: -0.01em; }
      .serif3 { font-family: Fraunces, Georgia, 'Times New Roman', serif; font-weight: 700; }
      .eyebrow3 { font-family: 'JetBrains Mono', 'Courier New', monospace; font-weight: 700; letter-spacing: 0.22em; }
      .eyebrow3-arc { font-family: 'JetBrains Mono', 'Courier New', monospace; font-weight: 700; letter-spacing: 0.32em; }
    </style>
    <path id="cp3-h-arc-top" d="M 30 90 A 60 60 0 0 1 150 90" />
    <path id="cp3-h-arc-bottom" d="M 28 90 A 62 62 0 0 0 152 90" />
  </defs>

  <!-- ICON -->
  <g transform="translate(0, -10)">
    <circle cx="90" cy="90" r="82" class="cream3" stroke="#0F1623" stroke-width="6"/>
    <circle cx="90" cy="90" r="73" class="stroke-ink3" stroke-width="2"/>
    <text class="eyebrow3-arc ink3" font-size="11">
      <textPath href="#cp3-h-arc-top" startOffset="50%" text-anchor="middle">COMPAR · PRIX</textPath>
    </text>
    <text class="eyebrow3-arc ink3" font-size="11">
      <textPath href="#cp3-h-arc-bottom" startOffset="50%" text-anchor="middle">№ 01 · HEBDO</textPath>
    </text>
    <text x="90" y="125" text-anchor="middle" class="serif3 navy3" font-size="118">€</text>
    <circle cx="36" cy="134" r="2.5" class="ink3"/>
    <circle cx="144" cy="134" r="2.5" class="ink3"/>
  </g>

  <!-- WORDMARK -->
  <g transform="translate(220, 0)">
    <text x="0" y="106" class="display3 ink3" font-size="76">Compar<tspan class="navy3">Prix</tspan></text>
    <line x1="0" y1="120" x2="280" y2="120" stroke="#0F1623" stroke-width="3"/>
    <line x1="0" y1="127" x2="280" y2="127" stroke="#0F1623" stroke-width="1"/>
    <text x="0" y="152" class="eyebrow3" font-size="12" fill="#374150">LE BULLETIN DES PRIX DISCOUNT · № 01</text>
  </g>
</svg>
