<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 480" width="360" height="480" role="img" aria-labelledby="cp3v-title cp3v-desc">
  <title id="cp3v-title">ComparPrix — Le Bulletin des Prix Discount</title>
  <desc id="cp3v-desc">Logo ComparPrix vertical : médaillon éditorial € monumental au-dessus du wordmark.</desc>
  <defs>
    <style>
      .ink3 { fill: #0F1623; }
      .navy3 { fill: #0F2C52; }
      .cream3 { fill: #FCFDFE; }
      .stroke-ink3 { stroke: #0F1623; fill: none; }
      .display3 { font-family: 'Big Shoulders Display', Impact, 'Arial Black', sans-serif; font-weight: 800; letter-spacing: -0.01em; }
      .serif3 { font-family: Fraunces, Georgia, 'Times New Roman', serif; font-weight: 700; }
      .eyebrow3 { font-family: 'JetBrains Mono', 'Courier New', monospace; font-weight: 700; letter-spacing: 0.22em; }
      .eyebrow3-arc { font-family: 'JetBrains Mono', 'Courier New', monospace; font-weight: 700; letter-spacing: 0.35em; }
    </style>
    <path id="cp3-v-arc-top" d="M 30 100 A 70 70 0 0 1 170 100" />
    <path id="cp3-v-arc-bottom" d="M 28 100 A 72 72 0 0 0 172 100" />
  </defs>

  <!-- ICON centered -->
  <g transform="translate(80, 0)">
    <circle cx="100" cy="100" r="92" class="cream3" stroke="#0F1623" stroke-width="6"/>
    <circle cx="100" cy="100" r="82" class="stroke-ink3" stroke-width="2"/>
    <text class="eyebrow3-arc ink3" font-size="12">
      <textPath href="#cp3-v-arc-top" startOffset="50%" text-anchor="middle">COMPAR · PRIX · 2026</textPath>
    </text>
    <text class="eyebrow3-arc ink3" font-size="12">
      <textPath href="#cp3-v-arc-bottom" startOffset="50%" text-anchor="middle">№ 01 · HEBDO</textPath>
    </text>
    <text x="100" y="138" text-anchor="middle" class="serif3 navy3" font-size="130">€</text>
    <circle cx="42" cy="148" r="3" class="ink3"/>
    <circle cx="158" cy="148" r="3" class="ink3"/>
  </g>

  <!-- WORDMARK -->
  <g>
    <text x="180" y="296" text-anchor="middle" class="display3 ink3" font-size="80">Compar<tspan class="navy3">Prix</tspan></text>
    <line x1="60" y1="312" x2="300" y2="312" stroke="#0F1623" stroke-width="3"/>
    <line x1="60" y1="319" x2="300" y2="319" stroke="#0F1623" stroke-width="1"/>
    <text x="180" y="346" text-anchor="middle" class="eyebrow3" font-size="13" fill="#374150">LE BULLETIN DES PRIX DISCOUNT</text>
    <text x="180" y="392" text-anchor="middle" class="eyebrow3" font-size="11" fill="#647382">№ 01 — 10 ENSEIGNES — HEBDO</text>
  </g>
</svg>
